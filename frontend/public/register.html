<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Register | SmartEval</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body data-page="register">
<div class="auth-page">
  <!-- Left decorative panel -->
  <div class="auth-left">
    <div class="auth-grid-lines"></div>
    <div class="auth-left-content">
      <div class="auth-orb">
        <div class="auth-orb-inner">⚡</div>
      </div>
      <h2 class="auth-left-title">Join the<br><span>Faculty</span> Network.</h2>
      <p class="auth-left-sub">Register in seconds and unlock powerful evaluation tools designed for academic excellence.</p>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🎓</div>
        <div class="auth-logo-text">
          <h1>SmartEval</h1>
          <p>Evaluation &amp; Grading System</p>
        </div>
      </div>
      <h2 class="auth-title">Create account</h2>
      <p class="auth-sub">Register as a faculty member</p>
      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input id="name" type="text" placeholder="Dr. Jane Smith" required autocomplete="name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input id="email" type="email" placeholder="you@university.edu" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password <span style="color:var(--muted);font-weight:400;text-transform:none;">(min 6 chars)</span></label>
          <input id="password" type="password" placeholder="••••••••" minlength="6" required autocomplete="new-password"/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:15px;">
          Create Account →
        </button>
      </form>
      <p class="auth-link">Already registered? <a href="/index.html">Sign in</a></p>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script type="module" src="/js/app.js"></script>
</body>
</html>
