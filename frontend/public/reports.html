<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reports | SmartEval</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body data-page="reports">
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <div><div class="brand-name">SmartEval</div><div class="brand-sub">Faculty Portal</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="/dashboard.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
      <div class="nav-section-label">Manage</div>
      <a href="/students.html"    class="nav-link"><span class="icon">👥</span> Students</a>
      <a href="/assignments.html" class="nav-link"><span class="icon">📋</span> Assignments</a>
      <a href="/evaluation.html"  class="nav-link"><span class="icon">✏️</span> Evaluation</a>
      <div class="nav-section-label">Reports</div>
      <a href="/analytics.html" class="nav-link"><span class="icon">📈</span> Analytics</a>
      <a href="/reports.html"   class="nav-link active"><span class="icon">📄</span> Reports</a>
    </nav>
    <div class="sidebar-footer">
      <a class="nav-link" id="darkToggle"><span class="icon">🌙</span> Dark Mode</a>
      <a class="nav-link logout" id="logoutBtn"><span class="icon">🚪</span> Logout</a>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="page-content">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <span class="topbar-title">Reports</span>
    </header>
    <main>
      <div class="page-header">
        <h1>Evaluation Reports</h1>
        <p>View and export all student evaluations</p>
      </div>

      <div class="card" style="padding:0;overflow:hidden;">
        <!-- Toolbar -->
        <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;">
          <div style="font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text);">📄 All Reports</div>
          <div style="display:flex;gap:8px;">
            <button id="exportCsv" class="btn btn-ghost btn-sm">⬇️ Export CSV</button>
            <button id="printReport" class="btn btn-ghost btn-sm">🖨️ Print</button>
          </div>
        </div>
        <div class="table-wrap" style="border:none;border-radius:0;">
          <table>
            <thead>
              <tr>
                <th>Student</th>
                <th>Assignment</th>
                <th>Total Marks</th>
                <th>Grade</th>
                <th>Feedback</th>
              </tr>
            </thead>
            <tbody id="reportBody">
              <tr><td colspan="5"><div class="empty-state"><div class="empty-icon">📄</div><p>No reports yet</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="toast-container"></div>
<script type="module" src="/js/app.js"></script>
</body>
</html>
