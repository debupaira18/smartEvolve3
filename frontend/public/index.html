<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login | SmartEval</title>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body data-page="login">
<div class="auth-page">
  <!-- Left decorative panel -->
  <div class="auth-left">
    <div class="auth-grid-lines"></div>
    <div class="auth-left-content">
      <div class="auth-orb">
        <div class="auth-orb-inner">🎓</div>
      </div>
      <h2 class="auth-left-title">Evaluate.<br><span>Grade.</span> Elevate.</h2>
      <p class="auth-left-sub">A premium evaluation system built for faculty who demand more from their grading workflow.</p>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon">🎓</div>
        <div class="auth-logo-text">
          <h1>SmartEval</h1>
          <p>Evaluation &amp; Grading System</p>
        </div>
      </div>
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-sub">Sign in to your faculty account</p>
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label class="form-label">Email address</label>
          <input id="email" type="email" placeholder="you@university.edu" required autocomplete="email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:15px;">
          Sign In →
        </button>
      </form>
      <p class="auth-link">New faculty? <a href="/register.html">Create an account</a></p>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script type="module" src="/js/app.js"></script>
</body>
</html>
